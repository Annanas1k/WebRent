<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>WebRent - Înregistrare</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .register-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: #111827;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-bottom: 6px;
        }

        .brand span { color: #e63946; }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #111827;
            text-align: center;
        }

        .page-subtitle {
            color: #9ca3af;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 28px;
        }

        .form-label {
            font-size: 0.82rem;
            font-weight: 500;
            color: #4b5563;
            margin-bottom: 6px;
        }

        .form-control {
            background: #f9fafb;
            border: 1.5px solid #e5e7eb;
            border-radius: 0 10px 10px 0 !important;
            padding: 10px 14px;
            font-size: 0.9rem;
            font-family: 'Outfit', sans-serif;
            color: #111827;
        }

        .form-control:focus {
            background: #fff;
            border-color: #e63946;
            box-shadow: 0 0 0 3px rgba(230,57,70,0.08);
            color: #111827;
        }

        .form-control::placeholder { color: #9ca3af; }

        .input-group-text {
            background: #f9fafb !important;
            border: 1.5px solid #e5e7eb !important;
            border-right: none !important;
            border-radius: 10px 0 0 10px !important;
            color: #9ca3af;
        }

        /* Când input e focused, și icon-ul să aibă border roșu */
        .input-group:focus-within .input-group-text {
            border-color: #e63946 !important;
        }

        .btn-register {
            background: #e63946;
            border: none;
            color: #fff;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: opacity 0.2s;
        }

        .btn-register:hover {
            opacity: 0.88;
            color: #fff;
        }

        .divider {
            border-color: #e5e7eb;
            opacity: 1;
        }

        .alert-danger-custom {
            background: #fff0f1;
            border: 1px solid #fecdd3;
            color: #be123c;
            border-radius: 10px;
            font-size: 0.85rem;
            padding: 10px 14px;
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 12px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="register-card">

    <a href="/" class="brand">Web<span>Rent</span></a>
    <div class="page-title mt-2">Creează cont nou</div>
    <div class="page-subtitle">Completează datele pentru a te înregistra</div>

    <!-- Eroare -->
    <div class="alert-danger-custom mb-3 d-flex align-items-center gap-2"
         th:if="${error}" th:text="${error}">
    </div>

    <form th:action="@{/register}" th:object="${user}" method="POST">

        <!-- Date personale -->
        <div class="section-label">Date personale</div>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label">Prenume</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" th:field="*{firstName}" class="form-control"
                           placeholder="Ion" required>
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Nume</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" th:field="*{lastName}" class="form-control"
                           placeholder="Popescu" required>
                </div>
            </div>
        </div>

        <!-- Contact -->
        <div class="section-label">Contact</div>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" th:field="*{email}" class="form-control"
                           placeholder="email@exemplu.com" required>
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Telefon</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                    <input type="text" th:field="*{phone}" class="form-control"
                           placeholder="+373 69 000 000">
                </div>
            </div>
        </div>

        <!-- Permis -->
        <div class="section-label">Permis de conducere</div>
        <div class="mb-3">
            <label class="form-label">Nr. Permis</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-card-text"></i></span>
                <input type="text" th:field="*{driverLicenseNumber}" class="form-control"
                       placeholder="ex: MD123456" required>
            </div>
        </div>

        <!-- Parolă -->
        <div class="section-label">Securitate</div>
        <div class="mb-4">
            <label class="form-label">Parolă</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" th:field="*{password}" class="form-control"
                       placeholder="Minim 6 caractere" required>
            </div>
        </div>

        <button type="submit" class="btn btn-register">
            Creează cont <i class="bi bi-arrow-right ms-1"></i>
        </button>

    </form>

    <hr class="divider my-4">

    <p class="text-center text-muted mb-0" style="font-size: 0.85rem;">
        Ai deja cont?
        <a th:href="@{/login}" style="color: #e63946; text-decoration: none; font-weight: 500;">
            Autentifică-te
        </a>
    </p>

</div>

</body>
</html>
