<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::section}, 'users')}">
<head>
    <title>Users - Admin</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Users table</h2>
        <a th:href="@{/admin/users/new}"
           class="btn btn-primary"
           style="background: var(--primary); border:none; padding: 10px 20px; border-radius: 10px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px;">
            <i class="bi bi-person-plus"></i> Add user
        </a>    </div>

    <div class="card border-0 shadow-sm p-4" style="border-radius: 15px;">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>Name</th>
                <th>Mail</th>
                <th>Phone</th>
                <th>Driver License</th>
                <th>Crated At</th>
                <th>ROLE</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.firstName + ' ' + user.lastName}">...</td>
                <td th:text="${user.email}">...</td>
                <td th:text="${user.phone}" >...</td>
                <td th:text="${user.driverLicenseNumber}" >...</td>
                <td th:text="${user.createdAt}" >...</td>
                <td th:text="${user.status}"  ><span class="badge bg-light text-dark border">...</span></td>
                <td class="text-end">
                    <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-outline-primary me-2">
                        <i class="bi bi-pencil"></i> Edit
                    </a>

                    <a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Sure ?')">
                        <i class="bi bi-trash"></i> Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
