<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::section}, 'cars')}">
<head>
    <title>Car Management - Admin</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-car-front me-2"></i>Cars Inventory</h2>
        <a th:href="@{/admin/cars/new}"
           class="btn btn-primary shadow-sm"
           style="background: var(--primary); border:none; padding: 10px 24px; border-radius: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px;">
            <i class="bi bi-plus-lg"></i> Add New Car
        </a>
    </div>

    <div class="card border-0 shadow-sm" style="border-radius: 15px; overflow: hidden;">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                <tr>
                    <th class="ps-4 py-3">Vehicle Details</th>
                    <th class="py-3">Category</th>
                    <th class="py-3">License Plate</th>
                    <th class="py-3">Price/Day</th>
                    <th class="text-end pe-4 py-3">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="car : ${cars}">
                    <td class="ps-4">
                        <div class="d-flex align-items-center">
                            <div class="me-3">
                                <img th:src="${car.imageUrl != null ? car.imageUrl : '/images/car-placeholder.png'}"
                                     alt="Car Image"
                                     class="rounded shadow-sm"
                                     style="width: 80px; height: 55px; object-fit: cover; border: 1px solid #eee;">
                            </div>
                            <div>
                                <div class="fw-bold text-dark" th:text="${car.brand + ' ' + car.model}">Brand Model</div>
                                <div class="small text-muted" th:text="${'Year: ' + car.year}">Year: 2024</div>
                            </div>
                        </div>
                    </td>

                    <td>
                        <span class="badge rounded-pill bg-light text-primary border border-primary-subtle px-3"
                              th:text="${car.category}">Sedan</span>
                    </td>

                    <td class="text-uppercase fw-medium text-muted" th:text="${car.licensePlate}">ABC 123</td>

                    <td>
                        <span class="fw-bold text-dark" th:text="${car.pricePerDay + ' MDL'}">0.00 $</span>
                    </td>

                    <td class="text-end">
                        <a th:href="@{/admin/cars/edit/{id}(id=${car.id})}" class="btn btn-sm btn-outline-primary me-2">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                        <a th:href="@{/admin/cars/delete/{id}(id=${car.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Sure ?')">
                            <i class="bi bi-trash"></i> Delete
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(cars)}">
                    <td colspan="5" class="text-center py-5 text-muted">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                        No cars found in the database.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
