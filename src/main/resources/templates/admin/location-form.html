<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::section}, 'locations')}">
<head>
    <title>Location Management | WebRent Admin</title>
</head>
<body>
<section>
    <div class="container-fluid">
        <div class="mb-4 d-flex align-items-center justify-content-between">
            <h3 class="fw-bold mb-0">
                <i class="bi bi-geo-alt me-2 text-primary"></i>
                <span th:text="${location.id != null ? 'Edit Location: ' + location.city : 'Add New Location'}">Location Details</span>
            </h3>
            <a th:href="@{/admin/locations}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                <i class="bi bi-arrow-left me-1"></i> Back to list
            </a>
        </div>

        <form th:action="@{/admin/locations/save}" th:object="${location}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
                <div class="card-body px-4 py-4">
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">City</label>
                        <div class="col-sm-7"><input type="text" th:field="*{city}" class="form-control" required></div>
                    </div>
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Full Address</label>
                        <div class="col-sm-7"><input type="text" th:field="*{address}" class="form-control" required></div>
                    </div>
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Phone Number</label>
                        <div class="col-sm-7"><input type="text" th:field="*{phone}" class="form-control" required></div>
                    </div>
                    <div class="row mb-0 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Working Hours</label>
                        <div class="col-sm-7"><input type="text" th:field="*{workingHours}" class="form-control" placeholder="e.g. 09:00 - 18:00"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-3 border-top d-flex justify-content-end gap-2 shadow-sm rounded-3">
                <a th:href="@{/admin/locations}" class="btn btn-light px-4">Cancel</a>
                <button type="submit" class="btn btn-primary px-5 fw-bold"><i class="bi bi-save me-2"></i> Save Location</button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
