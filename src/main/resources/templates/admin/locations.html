<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::section}, 'locations')}">
<head>
    <title>Locations - Admin</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Locations table</h2>
        <a th:href="@{/admin/locations/new}"
           class="btn btn-primary"
           style="background: var(--primary); border:none; padding: 10px 20px; border-radius: 10px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px;">
            <i class="bi bi-geo-alt"></i> Add location
        </a>
    </div>

    <div class="card border-0 shadow-sm p-4" style="border-radius: 15px;">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>City</th>
                <th>Address</th>
                <th>Phone</th>
                <th>Working Hours</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="location : ${locations}">
                <td th:text="${location.city}" class="fw-bold">...</td>
                <td th:text="${location.address}">...</td>
                <td th:text="${location.phone}">...</td>
                <td th:text="${location.workingHours}">...</td>
                <td class="text-end">
                    <a th:href="@{/admin/locations/edit/{id}(id=${location.id})}" class="btn btn-sm btn-outline-primary me-2">
                        <i class="bi bi-pencil"></i> Edit
                    </a>
                    <a th:href="@{/admin/locations/delete/{id}(id=${location.id})}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Sure ?')">
                        <i class="bi bi-trash"></i> Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
