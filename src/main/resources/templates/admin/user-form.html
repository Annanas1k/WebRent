<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::section}, 'users')}">
<head>
    <title>User Management | WebRent Admin</title>
</head>
<body>
<section>
    <div class="container-fluid">
        <div class="mb-4 d-flex align-items-center justify-content-between">
            <h3 class="fw-bold mb-0">
                <i class="bi bi-person-gear me-2 text-primary"></i>
                <span th:text="${user.id != null ? 'Edit User: ' + user.firstName : 'Create New User'}">User Details</span>
            </h3>
            <a th:href="@{/admin/users}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                <i class="bi bi-arrow-left me-1"></i> Back to list
            </a>
        </div>

        <form th:action="@{/admin/users/save}" th:object="${user}" method="post">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{createdAt}" />

            <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
                <div class="card-header bg-transparent border-bottom py-3">
                    <h6 class="mb-0 fw-bold text-uppercase small tracking-wide text-primary">1. Personal Profile</h6>
                </div>
                <div class="card-body px-4">

                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">First Name</label>
                        <div class="col-sm-7">
                            <input type="text" th:field="*{firstName}" class="form-control" required>
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Last Name</label>
                        <div class="col-sm-7">
                            <input type="text" th:field="*{lastName}" class="form-control" required>
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Email Address</label>
                        <div class="col-sm-7">
                            <input type="email" th:field="*{email}" class="form-control" required>
                        </div>
                    </div>

                    <div class="row mb-0 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Phone Number</label>
                        <div class="col-sm-7">
                            <input type="text" th:field="*{phone}" class="form-control">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
                <div class="card-header bg-transparent border-bottom py-3">
                    <h6 class="mb-0 fw-bold text-uppercase small tracking-wide text-primary">2. Legal & System Access</h6>
                </div>
                <div class="card-body px-4">

                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Driver License</label>
                        <div class="col-sm-7">
                            <input type="text" th:field="*{driverLicenseNumber}" class="form-control" required>
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Account Status</label>
                        <div class="col-sm-4">
                            <select th:field="*{status}" class="form-select">
                                <option th:each="st : ${T(com.usm.WebRent.entity.enums.UserStatus).values()}"
                                        th:value="${st}" th:text="${st}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-0 align-items-start">
                        <label class="col-sm-3 col-form-label fw-medium text-muted pt-2">Password</label>
                        <div class="col-sm-7">
                            <input type="password" th:field="*{password}" class="form-control"
                                   th:required="${user.id == null}">
                            <div class="form-text mt-2" th:if="${user.id != null}">
                                <span class="badge bg-light text-dark border">Info</span> Leave empty if no change is needed.
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-3 border-top d-flex justify-content-end gap-2 shadow-sm rounded-3">
                <a th:href="@{/admin/users}" class="btn btn-light px-4">Cancel</a>
                <button type="submit" class="btn btn-primary px-5 fw-bold">
                    <i class="bi bi-save me-2"></i> Save Changes
                </button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
