<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::section}, 'cars')}">
<head>
    <title>Car Management | WebRent Admin</title>
</head>
<body>
<section>
    <div class="container-fluid">
        <div class="mb-4 d-flex align-items-center justify-content-between">
            <h3 class="fw-bold mb-0">
                <i class="bi bi-car-front me-2 text-primary"></i>
                <span th:text="${car.id != null ? 'Edit Car: ' + car.brand + ' ' + car.model : 'Add New Car'}">Car Details</span>
            </h3>
            <a th:href="@{/admin/cars}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                <i class="bi bi-arrow-left me-1"></i> Back to list
            </a>
        </div>

        <form th:action="@{/admin/cars/save}" th:object="${car}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
                <div class="card-header bg-transparent border-bottom py-3">
                    <h6 class="mb-0 fw-bold text-uppercase small tracking-wide text-primary">1. Vehicle Information</h6>
                </div>
                <div class="card-body px-4">
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Brand</label>
                        <div class="col-sm-7"><input type="text" th:field="*{brand}" class="form-control" required></div>
                    </div>
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Model</label>
                        <div class="col-sm-7"><input type="text" th:field="*{model}" class="form-control" required></div>
                    </div>
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Year</label>
                        <div class="col-sm-3"><input type="number" th:field="*{year}" class="form-control" required></div>
                    </div>
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">License Plate</label>
                        <div class="col-sm-4"><input type="text" th:field="*{licensePlate}" class="form-control" required></div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
                <div class="card-header bg-transparent border-bottom py-3">
                    <h6 class="mb-0 fw-bold text-uppercase small tracking-wide text-primary">2. Technical & Pricing</h6>
                </div>
                <div class="card-body px-4">
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Category</label>
                        <div class="col-sm-4">
                            <select th:field="*{category}" class="form-select">
                                <option th:each="cat : ${T(com.usm.WebRent.entity.enums.CarCategory).values()}" th:value="${cat}" th:text="${cat}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Price Per Day (MDL)</label>
                        <div class="col-sm-3"><input type="number" step="0.01" th:field="*{pricePerDay}" class="form-control" required></div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Features</label>
                        <div class="col-sm-7"><textarea th:field="*{features}" class="form-control" rows="3"></textarea></div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-3 border-top d-flex justify-content-end gap-2 shadow-sm rounded-3">
                <a th:href="@{/admin/cars}" class="btn btn-light px-4">Cancel</a>
                <button type="submit" class="btn btn-primary px-5 fw-bold"><i class="bi bi-save me-2"></i> Save Car</button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
