<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::section}, 'cars')}">
<head>
    <title>Car Management | WebRent Admin</title>
</head>
<body>
<section>
    <div class="container-fluid">
        <div class="mb-4 d-flex align-items-center justify-content-between">
            <h3 class="fw-bold mb-0">
                <i class="bi bi-car-front me-2 text-primary"></i>
                <span th:text="${car.id != null ? 'Edit Car: ' + car.brand + ' ' + car.model : 'Add New Car'}">Car Details</span>
            </h3>
            <a th:href="@{/admin/cars}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                <i class="bi bi-arrow-left me-1"></i> Back to list
            </a>
        </div>

        <form th:action="@{/admin/cars/save}" th:object="${car}" method="post" enctype="multipart/form-data">

            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{imageUrl}" />

            <div class="row">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
                        <div class="card-header bg-transparent border-bottom py-3">
                            <h6 class="mb-0 fw-bold text-uppercase small tracking-wide text-primary">1. Vehicle Information</h6>
                        </div>
                        <div class="card-body px-4">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-medium text-muted">Brand</label>
                                    <input type="text" th:field="*{brand}" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-medium text-muted">Model</label>
                                    <input type="text" th:field="*{model}" class="form-control" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-medium text-muted">Year</label>
                                    <input type="number" th:field="*{year}" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-medium text-muted">License Plate</label>
                                    <input type="text" th:field="*{licensePlate}" class="form-control" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
                        <div class="card-header bg-transparent border-bottom py-3">
                            <h6 class="mb-0 fw-bold text-uppercase small tracking-wide text-primary">2. Technical & Pricing</h6>
                        </div>
                        <div class="card-body px-4">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-medium text-muted">Category</label>
                                    <select th:field="*{category}" class="form-select">
                                        <option th:each="cat : ${T(com.usm.WebRent.entity.enums.CarCategory).values()}"
                                                th:value="${cat}" th:text="${cat}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-medium text-muted">Price Per Day (MDL)</label>
                                    <input type="number" step="0.01" th:field="*{pricePerDay}" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-0">
                                <label class="form-label fw-medium text-muted">Features</label>
                                <textarea th:field="*{features}" class="form-control" rows="3" placeholder="AC, Automatic, Bluetooth, etc."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
                        <div class="card-header bg-transparent border-bottom py-3">
                            <h6 class="mb-0 fw-bold text-uppercase small tracking-wide text-primary">3. Visuals</h6>
                        </div>
                        <div class="card-body text-center">
                            <div class="mb-3 border rounded p-2 bg-light d-flex align-items-center justify-content-center" style="min-height: 200px;">
                                <img id="imgPreview" th:src="${car.imageUrl != null ? car.imageUrl : '/images/car-placeholder.png'}"
                                     alt="Preview" class="img-fluid rounded" style="max-height: 180px;">
                            </div>

                            <div class="text-start">
                                <label class="form-label fw-medium text-muted">Upload Photo</label>
                                <input type="file" name="imageFile" id="imageInput" class="form-control" accept="image/*">
                                <p class="small text-muted mt-2">Recommended: 800x600px, max 5MB.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-3 border-top d-flex justify-content-end gap-2 shadow-sm rounded-3 mt-2">
                <a th:href="@{/admin/cars}" class="btn btn-light px-4">Cancel</a>
                <button type="submit" class="btn btn-primary px-5 fw-bold">
                    <i class="bi bi-save me-2"></i> Save Car
                </button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('imageInput').onchange = evt => {
            const [file] = document.getElementById('imageInput').files;
            if (file) {
                document.getElementById('imgPreview').src = URL.createObjectURL(file);
            }
        }
    </script>
</section>
</body>
</html>
