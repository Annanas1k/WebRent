<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::section}, 'rentals')}">
<head>
    <title>Rental Management | WebRent Admin</title>
</head>
<body>
<section>
    <div class="container-fluid">
        <div class="mb-4 d-flex align-items-center justify-content-between">
            <h3 class="fw-bold mb-0">
                <i class="bi bi-calendar-check me-2 text-primary"></i>
                <span th:text="${rental.id != null ? 'Edit Rental #' + rental.id : 'Create New Rental'}">Rental Details</span>
            </h3>
            <a th:href="@{/admin/rentals}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                <i class="bi bi-arrow-left me-1"></i> Back to list
            </a>
        </div>

        <form th:action="@{/admin/rentals/save}" th:object="${rental}" method="post">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{createdAt}" />

            <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
                <div class="card-header bg-transparent border-bottom py-3">
                    <h6 class="mb-0 fw-bold text-uppercase small tracking-wide text-primary">1. Customer & Vehicle</h6>
                </div>
                <div class="card-body px-4">
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Customer</label>
                        <div class="col-sm-7">
                            <select th:field="*{user}" class="form-select" required>
                                <option th:each="u : ${usersList}" th:value="${u.id}" th:text="${u.firstName + ' ' + u.lastName}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Car</label>
                        <div class="col-sm-7">
                            <select th:field="*{car}" class="form-select" required>
                                <option th:each="c : ${carsList}" th:value="${c.id}" th:text="${c.brand + ' ' + c.model + ' (' + c.licensePlate + ')'}"></option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
                <div class="card-header bg-transparent border-bottom py-3">
                    <h6 class="mb-0 fw-bold text-uppercase small tracking-wide text-primary">2. Rental Period & Terms</h6>
                </div>
                <div class="card-body px-4">
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Start Date</label>
                        <div class="col-sm-4"><input type="date" th:field="*{startDate}" class="form-control" required></div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">End Date</label>
                        <div class="col-sm-4"><input type="date" th:field="*{endDate}" class="form-control" required></div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Pickup Location</label>
                        <div class="col-sm-7">
                            <select th:field="*{pickupLocation}" class="form-select">
                                <option th:each="loc : ${locationsList}" th:value="${loc.id}" th:text="${loc.city + ' - ' + loc.address}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Status</label>
                        <div class="col-sm-4">
                            <select th:field="*{status}" class="form-select">
                                <option th:each="st : ${T(com.usm.WebRent.entity.enums.RentalStatus).values()}" th:value="${st}" th:text="${st}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-0 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Total Price</label>
                        <div class="col-sm-3"><input type="number" step="0.01" th:field="*{totalPrice}" class="form-control" required></div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-3 border-top d-flex justify-content-end gap-2 shadow-sm rounded-3">
                <a th:href="@{/admin/rentals}" class="btn btn-light px-4">Cancel</a>
                <button type="submit" class="btn btn-primary px-5 fw-bold"><i class="bi bi-save me-2"></i> Save Rental</button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
