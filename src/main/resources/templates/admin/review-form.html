<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::section}, 'reviews')}">
<head>
    <title>Review Management | WebRent Admin</title>
</head>
<body>
<section>
    <div class="container-fluid">
        <div class="mb-4 d-flex align-items-center justify-content-between">
            <h3 class="fw-bold mb-0">
                <i class="bi bi-star me-2 text-primary"></i>
                <span th:text="${review.id != null ? 'Edit Review' : 'Add Manual Review'}">Review Details</span>
            </h3>
            <a th:href="@{/admin/reviews}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                <i class="bi bi-arrow-left me-1"></i> Back to list
            </a>
        </div>

        <form th:action="@{/admin/reviews/save}" th:object="${review}" method="post">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{createdAt}" />

            <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
                <div class="card-body px-4 py-4">
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Rating</label>
                        <div class="col-sm-4">
                            <select th:field="*{rating}" class="form-select">
                                <option th:each="r : ${T(com.usm.WebRent.entity.enums.ReviewRating).values()}" th:value="${r}" th:text="${r}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-medium text-muted">Comment</label>
                        <div class="col-sm-7"><textarea th:field="*{comment}" class="form-control" rows="4" required></textarea></div>
                    </div>
                    <div th:if="${review.id == null}">
                        <div class="row mb-3 align-items-center">
                            <label class="col-sm-3 col-form-label fw-medium text-muted">User</label>
                            <div class="col-sm-7">
                                <select th:field="*{user}" class="form-select">
                                    <option th:each="u : ${usersList}" th:value="${u.id}" th:text="${u.email}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="row mb-3 align-items-center">
                            <label class="col-sm-3 col-form-label fw-medium text-muted">Car</label>
                            <div class="col-sm-7">
                                <select th:field="*{car}" class="form-select">
                                    <option th:each="c : ${carsList}" th:value="${c.id}" th:text="${c.brand + ' ' + c.model}"></option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-3 border-top d-flex justify-content-end gap-2 shadow-sm rounded-3">
                <a th:href="@{/admin/reviews}" class="btn btn-light px-4">Cancel</a>
                <button type="submit" class="btn btn-primary px-5 fw-bold"><i class="bi bi-save me-2"></i> Save Review</button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
