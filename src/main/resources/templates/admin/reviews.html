<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::section}, 'reviews')}">
<head>
    <title>Reviews - Admin</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Reviews table</h2>
    </div>

    <div class="card border-0 shadow-sm p-4" style="border-radius: 15px;">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>User</th>
                <th>Car</th>
                <th>Rating</th>
                <th>Comment</th>
                <th>Date</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="review : ${reviews}">
                <td th:text="${review.user.firstName + ' ' + review.user.lastName}">...</td>
                <td th:text="${review.car.brand + ' ' + review.car.model}">...</td>
                <td>
                    <span class="text-warning">
                        <i class="bi bi-star-fill"></i>
                        <span th:text="${review.rating}"></span>
                    </span>
                </td>
                <td style="max-width: 250px;" class="text-truncate" th:text="${review.comment}">...</td>
                <td th:text="${#temporals.format(review.createdAt, 'dd-MM-yyyy HH:mm')}">...</td>
                <td class="text-end">
                    <a th:href="@{/admin/reviews/delete/{id}(id=${review.id})}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Delete this review?')">
                        <i class="bi bi-trash"></i> Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
