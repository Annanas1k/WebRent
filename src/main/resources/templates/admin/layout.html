<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, activePage)">
<head>
    <meta charset="UTF-8">
    <title>WebRent Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #e63946;
            --primary-light: #fef2f2;
            --bg-body: #f4f7f6;
            --sidebar-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --sidebar-width: 260px;
        }

        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; }

        /* TOPBAR */
        .admin-topbar {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: #fff; border-bottom: 1px solid var(--border);
            z-index: 1050; display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
        }

        /* SIDEBAR */
        .admin-sidebar {
            position: fixed; top: 70px; left: 0; bottom: 0; width: var(--sidebar-width);
            background: var(--sidebar-bg); border-right: 1px solid var(--border);
            padding: 25px 15px; z-index: 1040;
        }

        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 15px;
            color: var(--text-muted); text-decoration: none; font-weight: 500;
            border-radius: 10px; transition: 0.2s; margin-bottom: 5px;
        }

        .nav-link:hover { background: var(--primary-light); color: var(--primary); }
        .nav-link.active { background: var(--primary); color: white; }

        /* MAIN CONTENT AREA */
        .admin-content {
            margin-left: var(--sidebar-width);
            padding: 100px 40px 40px;
            min-height: 100vh;
        }

        .logo { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700; text-decoration: none; color: #000; }
        .logo span { color: var(--primary); }
    </style>
</head>
<body>

<header class="admin-topbar">
    <a th:href="@{/admin/dashboard}" class="logo">Web<span>Rent</span></a>
    <div class="d-flex align-items-center gap-3">
        <div class="text-end">
            <div class="fw-bold" th:text="${loggedUser?.firstName + ' ' + loggedUser?.lastName}">Admin</div>
            <small class="text-muted" th:text="${loggedUser?.email}">admin@mail.com</small>
        </div>
        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
             style="width: 42px; height: 42px; font-weight: bold; background-color: var(--primary) !important;"
             th:text="${loggedUser != null ? #strings.substring(loggedUser.firstName,0,1) : 'A'}">A</div>
    </div>
</header>

<aside class="admin-sidebar">
    <a th:href="@{/admin/dashboard}" class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a th:href="@{/admin/users}" class="nav-link" th:classappend="${activePage == 'users' ? 'active' : ''}">
        <i class="bi bi-people"></i> Utilizatori
    </a>
    <a th:href="@{/admin/cars}" class="nav-link" th:classappend="${activePage == 'cars' ? 'active' : ''}">
        <i class="bi bi-car-front"></i> Mașini
    </a>
    <a th:href="@{/admin/reservations}" class="nav-link" th:classappend="${activePage == 'reservations' ? 'active' : ''}">
        <i class="bi bi-calendar-check"></i> Rezervări
    </a>
    <hr class="my-4" style="opacity: 0.1;">
    <a th:href="@{/logout}" class="nav-link text-danger">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>
</aside>

<main class="admin-content">
    <div th:replace="${content}">
    </div>
</main>

</body>
</html>
